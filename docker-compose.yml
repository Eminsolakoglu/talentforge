services:
  api:
    build: .
    container_name: talentforge-api
    ports:
      - "8000:8000"
    depends_on:
      - neo4j
      - postgres
      - redis
      - minio
    volumes:
      - ./data:/app/data
    environment:
      ENV: development
      DEBUG: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password123
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: talentforge
      POSTGRES_PASSWORD: talentforge123
      POSTGRES_DB: talentforge
      REDIS_HOST: redis
      REDIS_PORT: 6379
      R2_ENDPOINT: http://minio:9000
      R2_ACCESS_KEY_ID: talentforge
      R2_SECRET_ACCESS_KEY: talentforge123
      R2_BUCKET: talentforge-cvs
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      LLM_MODEL: ${LLM_MODEL:-llama-3.1-8b-instant}
    restart: unless-stopped

  streamlit:
    build: .
    container_name: talentforge-streamlit
    command: uv run streamlit run streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      API_URL: http://api:8000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password123
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26.0-community
    container_name: talentforge-neo4j
    ports:
      - "7474:7474"    # Browser arayüzü
      - "7687:7687"    # Bolt portu
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/plugins:/plugins
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_dbms_security_auth__minimum__password__length=4
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4JLABS_PLUGINS=["apoc", "graph-data-science"]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: talentforge-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: talentforge
      POSTGRES_PASSWORD: talentforge123
      POSTGRES_DB: talentforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: talentforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: talentforge-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: talentforge
      MINIO_ROOT_PASSWORD: talentforge123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  redis_data:
  minio_data:
